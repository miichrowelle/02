services:
  fermentation-planner:
    build: .
    container_name: fermentation-planner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/appdata/fermentation-planner/data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/fermentation.db
      - PORT=3000
